name: Playwright Tests

# Triggers disabled — this file is a reference for M40 (CI/CD Pipeline Setup).
# The active learning CI is progress.yml. To run this pipeline manually,
# use the "Run workflow" button in GitHub Actions.
on:
  workflow_dispatch:

jobs:
  test:
    name: "Playwright (shard ${{ matrix.shard }}/4)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Lumio dependencies
        run: cd lumio && npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Setup database
        run: cd lumio && npx prisma generate && npx prisma db push && npx prisma db seed
        env:
          DATABASE_URL: file:./prisma/test.db

      - name: Run Playwright tests (shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4
        env:
          CI: true
          NEXTAUTH_SECRET: ci-test-secret
          DATABASE_URL: file:./prisma/test.db

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge Playwright Reports
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        run: |
          mkdir -p all-blob-reports
          npx playwright merge-reports ./all-blob-reports --reporter html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
